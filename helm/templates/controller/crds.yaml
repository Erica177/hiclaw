{{- if .Values.controller.enabled }}
{{- if .Values.controller.crds.install }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workers.hiclaw.io
  labels:
    {{- include "hiclaw.controller.labels" . | nindent 4 }}
spec:
  group: hiclaw.io
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [model]
              properties:
                model:
                  type: string
                runtime:
                  type: string
                  enum: [openclaw, copaw]
                  default: openclaw
                image:
                  type: string
                identity:
                  type: string
                soul:
                  type: string
                agents:
                  type: string
                skills:
                  type: array
                  items:
                    type: string
                mcpServers:
                  type: array
                  items:
                    type: string
                package:
                  type: string
                expose:
                  type: array
                  items:
                    type: object
                    required: [port]
                    properties:
                      port:
                        type: integer
                      protocol:
                        type: string
                        enum: [http, grpc]
                        default: http
                channelPolicy:
                  type: object
                  properties:
                    groupAllowExtra:
                      type: array
                      items:
                        type: string
                    groupDenyExtra:
                      type: array
                      items:
                        type: string
                    dmAllowExtra:
                      type: array
                      items:
                        type: string
                    dmDenyExtra:
                      type: array
                      items:
                        type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Running, Updating, Stopped, Failed]
                matrixUserID:
                  type: string
                roomID:
                  type: string
                containerState:
                  type: string
                lastHeartbeat:
                  type: string
                  format: date-time
                message:
                  type: string
                exposedPorts:
                  type: array
                  items:
                    type: object
                    properties:
                      port:
                        type: integer
                      domain:
                        type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Model
          type: string
          jsonPath: .spec.model
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Runtime
          type: string
          jsonPath: .spec.runtime
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: workers
    singular: worker
    kind: Worker
    shortNames: [wk]
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: teams.hiclaw.io
  labels:
    {{- include "hiclaw.controller.labels" . | nindent 4 }}
spec:
  group: hiclaw.io
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [leader, workers]
              properties:
                description:
                  type: string
                peerMentions:
                  type: boolean
                channelPolicy:
                  type: object
                  properties:
                    groupAllowExtra:
                      type: array
                      items:
                        type: string
                    groupDenyExtra:
                      type: array
                      items:
                        type: string
                    dmAllowExtra:
                      type: array
                      items:
                        type: string
                    dmDenyExtra:
                      type: array
                      items:
                        type: string
                admin:
                  type: object
                  properties:
                    name:
                      type: string
                    matrixUserId:
                      type: string
                leader:
                  type: object
                  required: [name]
                  properties:
                    name:
                      type: string
                    model:
                      type: string
                    identity:
                      type: string
                    soul:
                      type: string
                    agents:
                      type: string
                    package:
                      type: string
                    channelPolicy:
                      type: object
                      properties:
                        groupAllowExtra:
                          type: array
                          items:
                            type: string
                        groupDenyExtra:
                          type: array
                          items:
                            type: string
                        dmAllowExtra:
                          type: array
                          items:
                            type: string
                        dmDenyExtra:
                          type: array
                          items:
                            type: string
                workers:
                  type: array
                  items:
                    type: object
                    required: [name]
                    properties:
                      name:
                        type: string
                      model:
                        type: string
                      runtime:
                        type: string
                        enum: [openclaw, copaw]
                      image:
                        type: string
                      identity:
                        type: string
                      soul:
                        type: string
                      agents:
                        type: string
                      skills:
                        type: array
                        items:
                          type: string
                      mcpServers:
                        type: array
                        items:
                          type: string
                      package:
                        type: string
                      expose:
                        type: array
                        items:
                          type: object
                          required: [port]
                          properties:
                            port:
                              type: integer
                            protocol:
                              type: string
                              enum: [http, grpc]
                              default: http
                      channelPolicy:
                        type: object
                        properties:
                          groupAllowExtra:
                            type: array
                            items:
                              type: string
                          groupDenyExtra:
                            type: array
                            items:
                              type: string
                          dmAllowExtra:
                            type: array
                            items:
                              type: string
                          dmDenyExtra:
                            type: array
                            items:
                              type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Active, Degraded, Failed]
                teamRoomID:
                  type: string
                leaderReady:
                  type: boolean
                readyWorkers:
                  type: integer
                totalWorkers:
                  type: integer
                message:
                  type: string
                workerExposedPorts:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Leader
          type: string
          jsonPath: .spec.leader.name
        - name: Workers
          type: integer
          jsonPath: .status.totalWorkers
        - name: Ready
          type: integer
          jsonPath: .status.readyWorkers
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: teams
    singular: team
    kind: Team
    shortNames: [tm]
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: humans.hiclaw.io
  labels:
    {{- include "hiclaw.controller.labels" . | nindent 4 }}
spec:
  group: hiclaw.io
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [displayName, permissionLevel]
              properties:
                displayName:
                  type: string
                email:
                  type: string
                  format: email
                permissionLevel:
                  type: integer
                  minimum: 1
                  maximum: 3
                accessibleTeams:
                  type: array
                  items:
                    type: string
                accessibleWorkers:
                  type: array
                  items:
                    type: string
                note:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Active, Failed]
                matrixUserID:
                  type: string
                initialPassword:
                  type: string
                rooms:
                  type: array
                  items:
                    type: string
                emailSent:
                  type: boolean
                message:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Display Name
          type: string
          jsonPath: .spec.displayName
        - name: Level
          type: integer
          jsonPath: .spec.permissionLevel
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: humans
    singular: human
    kind: Human
    shortNames: [hm]
{{- end }}
{{- end }}
